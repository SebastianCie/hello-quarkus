quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.management.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/BETA_BATTLE

%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/BETA_BATTLE
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.locations=db/migration,db/dev
%dev.quarkus.flyway.out-of-order=true
%dev.quarkus.http.auth.permission.authenticated.policy=permit
%dev.beta-battle.dev-user-id=00000000-0000-0000-0000-000000000001

quarkus.flyway.migrate-at-start=true

quarkus.hibernate-orm.database.generation=none

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Beta Battle API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.management.enabled=false
quarkus.smallrye-openapi.auto-add-security=false

# --- JWT (SmallRye JWT) ---
# Produktion: Schlüssel aus Vault/K8s Secret via BETABATTLE_JWT_* Env-Variablen laden
mp.jwt.verify.publickey.location=keys/publicKey.pem
mp.jwt.verify.issuer=${BETABATTLE_ISSUER:https://api.betabattle.app}
smallrye.jwt.sign.key.location=keys/privateKey.pem
smallrye.jwt.sign.key.id=betabattle-key-1
# Ablaufzeit der Access Tokens (Sekunden) – auch im JWT-Builder gesetzt
smallrye.jwt.new-token.lifespan=900

# --- HTTP Auth ---
quarkus.http.auth.permission.public.paths=/auth/*,/api/v1/competitions/by-token/*,/api/v1/competitions/by-token/*/register,/api/v1/competitions/by-token/*/me,/api/v1/scoreboard/*,/api/v1/scoreboard/*/stream,/api/v1/scoreboard/*/*,/api/v1/settings
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# --- CORS ---
# credentials=true + explizite Origins sind Pflicht für HttpOnly-Cookie-Unterstützung
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5175}
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH

# --- Mailer ---
# Produktion: SMTP-Zugangsdaten via Umgebungsvariablen
quarkus.mailer.host=${SMTP_HOST:localhost}
quarkus.mailer.port=${SMTP_PORT:1025}
quarkus.mailer.from=${SMTP_FROM:noreply@betabattle.app}
quarkus.mailer.start-tls=DISABLED
%dev.quarkus.mailer.mock=true

# --- Cookie-Sicherheit ---
# In Produktion: true (HTTPS erforderlich für Secure-Flag)
beta-battle.cookie.secure=true
%dev.beta-battle.cookie.secure=false

# --- Frontend URL (für E-Mail-Links) ---
beta-battle.frontend-url=${FRONTEND_URL:https://app.betabattle.app}
%dev.beta-battle.frontend-url=http://localhost:5173
