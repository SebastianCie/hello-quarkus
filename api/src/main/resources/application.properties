quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.management.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/BETA_BATTLE

%dev.quarkus.http.port=8090
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/BETA_BATTLE
%dev.quarkus.flyway.migrate-at-start=true
%dev.quarkus.flyway.locations=db/migration,db/dev
%dev.quarkus.flyway.out-of-order=true
%dev.quarkus.http.auth.permission.authenticated.policy=permit
%dev.beta-battle.dev-user-id=00000000-0000-0000-0000-000000000001

quarkus.flyway.migrate-at-start=true

quarkus.hibernate-orm.database.generation=none

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Beta Battle API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.management.enabled=false
quarkus.smallrye-openapi.auto-add-security=false

quarkus.oidc.auth-server-url=https://keycloak.heim.apps/realms/heim
quarkus.oidc.client-id=beta-battle
quarkus.oidc.application-type=service
quarkus.oidc.tls.verification=none
quarkus.oidc.roles.role-claim-path=groups

quarkus.http.auth.permission.public.paths=/api/v1/account/register
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# Keycloak Admin Client — used for creating user accounts during registration
# In dev: disabled via beta-battle.keycloak.enabled=false
beta-battle.keycloak.enabled=true
beta-battle.keycloak.url=https://keycloak.heim.apps
beta-battle.keycloak.realm=heim
beta-battle.keycloak.client-id=beta-battle
beta-battle.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:changeme}

%dev.quarkus.oidc.tenant-enabled=false
%dev.beta-battle.keycloak.enabled=false
