name: Build and Push Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: quay.io
  NAMESPACE: sebastianeichh

jobs:
  build-api:
    name: API
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: api
        run: ./mvnw package -DskipTests -Dquarkus.swagger-ui.always-include=true -Dquarkus.smallrye-openapi.management.enabled=false

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/src/main/docker/Dockerfile.jvm
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/beta-battle-api:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/beta-battle-api:${{ github.sha }}

  build-frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        app: [admin, athlete, register, scoreboard]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Quay.io
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push ${{ matrix.app }} image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/${{ matrix.app }}
          push: ${{ github.event_name != 'pull_request' }}
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/beta-battle-${{ matrix.app }}:latest
            ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/beta-battle-${{ matrix.app }}:${{ github.sha }}
