quarkus.management.enabled=true
quarkus.management.port=9000
quarkus.management.host=0.0.0.0

quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/BETA_BATTLE

%dev.quarkus.datasource.jdbc.url=
%dev.quarkus.flyway.migrate-at-start=false

quarkus.flyway.migrate-at-start=true

quarkus.hibernate-orm.database.generation=none

quarkus.swagger-ui.always-include=true
quarkus.smallrye-openapi.info-title=Beta Battle API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.management.enabled=false
quarkus.smallrye-openapi.security-scheme=oidc
quarkus.smallrye-openapi.oidc-open-id-connect-url=https://keycloak.heim.apps/realms/heim/.well-known/openid-configuration
quarkus.swagger-ui.oauth-client-id=beta-battle
quarkus.swagger-ui.oauth-use-pkce=true

quarkus.oidc.auth-server-url=https://keycloak.heim.apps/realms/heim
quarkus.oidc.client-id=beta-battle
quarkus.oidc.application-type=service
quarkus.oidc.tls.verification=none
quarkus.oidc.roles.role-claim-path=groups

quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

%dev.quarkus.oidc.tenant-enabled=false
