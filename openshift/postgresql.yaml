# Secret wird per CLI angelegt (nicht in Git):
# oc create secret generic postgresql-secret \
#   --from-literal=POSTGRES_USER=betabattle \
#   --from-literal=POSTGRES_PASSWORD=<passwort> \
#   --from-literal=POSTGRES_DB=BETA_BATTLE \
#   -n sebastianeichh-dev
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: sebastianeichh-dev
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: sebastianeichh-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          # bitnami/postgresql läuft als non-root (UID 1001) – kompatibel mit OpenShift SCCs
          image: bitnami/postgresql:16
          ports:
            - containerPort: 5432
          env:
            # bitnami verwendet POSTGRESQL_* statt POSTGRES_*
            - name: POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: POSTGRES_DB
          volumeMounts:
            - name: data
              mountPath: /bitnami/postgresql
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: sebastianeichh-dev
spec:
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
